# layrics 配置文件
# 路径: $XDG_CONFIG_HOME/layrics/config.toml 或 ~/.config/layrics/config.toml

# 目标帧率（覆盖 vsync），-1 表示跟随显示器刷新率
# target_fps = 30

# 歌词搜索源（排序决定展示优先级，空列表则用默认 [QM, NE]）
# 可选: QM, KG, NE, LRCLIB
sources = ["QM", "NE"]

# 字体映射: 检测到的语言 → 字体名
# 语言: ja (日语), zh (中文), ko (韩语), ru (俄语), default
[fonts]
ja = "Noto Sans CJK JP"
zh = "Noto Sans CJK SC"

# ASS 样式覆盖
[style.primary]
# font_name = "思源黑体"
# font_size = 48

[style.secondary]
# font_size = 36

# 主/副歌词选择优先级
# 每项可以是 track 类型 (orig, ts, roma) 或语言代码 (zh, ja, ko, ru)
# 从左到右优先级依次降低
[lyrics]
primary = ["orig", "ja", "zh"]
# secondary = ["ts", "roma", "en"]   # 注释掉则使用默认 ["ts"]

# MPRIS 播放器过滤（正则）
# 留空或缺失则不过滤，取第一个正在播放的
include_players = []

# ASS 生成器配置
[assprovider.default]
primary_position = "top"
karaoke = true
line_mode = "single"
secondary = true
advance_ms = 0
margin_v_spacing = 2
